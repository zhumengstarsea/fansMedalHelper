USERS:
  - access_key: XXXXXX # 注意半角冒号后的空格 否则格式会错误
    white_uid: 0 # 白名单 UID, 多个 UID 以半角逗号,分隔，填写后只会打卡这些用户，黑名单失效，不用就填 0
    banned_uid: 0 # 黑名单 UID 多个 UID 以半角逗号,分隔，填写后不会打卡这些用户，不填则不限制，两个都填 0 则不限制
  - access_key:
    white_uid: 0
    banned_uid: 0
  # 注意对齐
  # 多用户以上格式添加
  # 严格要求按照 yaml 格式
  # 半角井号后为注释 半角井号前后必须有空格！半角井号前后必须有空格！半角井号前后必须有空格！
  # 半角冒号后面也要有空格！半角冒号前面也要有空格！半角冒号前面也要有空格！
  # 半角冒号: 半角逗号, 半角井号# 三个符号前后都需要有空格，如不了解可以使用 yaml 格式化工具检查
CRON: # 0 0 * * *
# 这里是 cron 表达式，表达式写法可参考 https://crontab.cronhub.io
# 如需设置多 cron 表达式，可以写为 YAML 数组，也可使用 || 进行分割
# 如果不填，则不使用内置定时器，填写正确后要保持该进程一直运行
STOPWATCHINGTIME: # '00:00:00' 或 86400
# 可用于当单次任务运行总时间大于一定时间（尤指直播），可能影响下次任务时，不填写不生效
# 本设置项前仅对直播有效
# 支持 'HH:mm:ss' 格式 和 秒格式
# 'HH:mm:ss' 格式：从现在起下次到这个时间（即 24 小时内），注意要加引号（单双不限）
# 秒格式：从现在起到多少秒（如 86400 为一天）

SENDKEY: # Server 酱微信推送 可选 获取地址：https://sct.ftqq.com/
MOREPUSH: # 更多种类的推送 详细配置见文档

PROXY: # 推送代理地址，如：http://1.2.3.4:5678 支持 http/socks4/socks5 不支持 https 不用代理的不用填
#########以下为自定义配置#########

doSign: 0 # 直播区签到控制，-1 不签到，0 (默认) 签到

WATCHINGLIVE: 25 # 每日每直播间观看时长，单位分钟。设置为 0 关闭功能；默认且建议 25 分钟，新版 25 分钟即满

MIN_INTIMACY_THRESHOLD: 30 # 亲密度阈值，单位点。只有今日亲密度小于此值时才执行观看、点赞任务；设置为 0 则无视限制；默认且建议 30 点，新版观看直播只能加 30 点亲密度

WATCHINGLIVE_CD: 60 # 心跳包间隔时间，单位秒。设置为 0 异步发送心跳包；设置大于 0 的值为同步发送间隔；默认且建议 60 秒，时间过短容易风控

LIKE_CD: -1 # 点赞间隔时间，单位秒。设置为 -1 关闭功能；设置为 0 异步点赞；设置大于 0 的值为同步点赞间隔；默认 3 秒，建议 -1 关闭，点赞打卡无亲密度

DANMAKU_CD: -1 # 弹幕间隔时间，单位秒。设置为 -1 关闭功能；设置为 0 异步发送弹幕；设置大于 0 的值为同步发送间隔；默认 6 秒，建议 -1 关闭，弹幕打卡无亲密度且容易被禁言

SIGNINGROUP_CD: -1 # 应援团签到间隔时间，单位秒。设置为 -1 关闭功能；设置为 0 异步签到；设置大于 0 的值为同步签到间隔；默认 2 秒，建议 -1 关闭，应援团打卡无亲密度

CUSTOMSIGNIN_CD: -1 # 活动签到间隔时间，单位秒。设置为 -1 关闭功能；设置为 0 异步签到；设置大于 0 的值为同步签到间隔；默认 2 秒，建议仅在活动期间开启

WEARMEDAL: 0 # 弹幕打卡时自动带上当前房间的粉丝牌。设置为 0 关闭功能；设置为 1 则开启；默认且建议 -1 关闭，建议使用B站自带的 优先展示当前直播间的粉丝勋章 功能

CRON_INDEX: 0 # 仅第几次执行签到打卡，整数。设置为 0 则每次都执行签到打卡；正整数表示只在第 N 个 cron 执行；负整数表示只在倒数第 N 个 cron 执行；默认 0 都执行，建议 -1 最后一个再签到避免活动签到影响后续亲密度判断
# 说明：
# 所有 CD 配置项的新规则：
# -1: 关闭该功能
# 0: 异步执行（同时操作所有目标，速度快但可能不稳定，且容易触发风控）
# >0: 同步执行（建议同步执行，逐个操作目标，间隔时间为设定的时间，更稳定）
# 粉丝牌数大于 30 的用户建议使用同步（设置大于 0 的值），会更加稳定
# 多定时和多用户之间依然是异步，不受配置影响
